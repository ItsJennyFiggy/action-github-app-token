name: Test Action

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Lint and Test Action
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v7

      # 2. Lint shell scripts. shellcheck is preinstalled on ubuntu-latest.
      - name: Run ShellCheck
        run: shellcheck scripts/*.sh

      # 3. Install bats (not preinstalled on the runner).
      - name: Set up bats
        uses: bats-core/bats-action@4.0.0

      # 4. Run bats unit tests (the aws CLI is mocked; no network/SSM is touched).
      - name: Run bats Tests
        run: bats tests/

      # NOTE: there is intentionally NO `uses: ./` integration test. Running this
      # action for real fetches credentials from SSM and mints a live GitHub App
      # token, so it cannot run safely in CI. The security logic in scripts/ is
      # fully covered by the mocked bats suite instead.
