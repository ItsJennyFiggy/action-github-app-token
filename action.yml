name: 'Composite GitHub Action Template'
description: 'A standard template for writing GitHub Actions as composite/shell actions'
author: 'ItsJennyFiggy'
inputs:
  who-to-greet:
    description: 'Who to greet in the log'
    required: true
    default: 'World'
outputs:
  greeting:
    description: 'The resulting greeting message'
    value: ${{ steps.greet.outputs.greeting }}
runs:
  using: 'composite'
  steps:
    # Composite steps stay thin: real logic lives in scripts/ so it is
    # unit-testable with bats. Replace this example step with your own.
    - name: Greet
      id: greet
      shell: bash
      run: "${GITHUB_ACTION_PATH}/scripts/greet.sh"
      env:
        INPUT_WHO_TO_GREET: ${{ inputs.who-to-greet }}
